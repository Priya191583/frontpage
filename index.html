<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ContentGuard — Plagiarism Detection</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:      #080c10;
    --border:  #1e2830;
    --accent:  #00e5ff;
    --accent2: #7b61ff;
    --text:    #e8edf2;
    --muted:   #5a6a7a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
  }
  .blob-1 { width: 600px; height: 600px; background: var(--accent2); top: -200px; right: -150px; }
  .blob-2 { width: 400px; height: 400px; background: var(--accent);  bottom: 100px; left: -100px; }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    height: 64px;
    background: rgba(8,12,16,0.8);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -0.5px;
    color: var(--text);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-badge {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-badge svg { width: 16px; height: 16px; }

  .nav-cta {
    background: var(--accent);
    color: #000;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 20px;
    border-radius: 6px;
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .nav-cta:hover { opacity: 0.85; }

  .hero {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 120px 24px 80px;
  }

  .hero-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,229,255,0.08);
    border: 1px solid rgba(0,229,255,0.2);
    color: var(--accent);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 32px;
    animation: fadeUp 0.6s ease both;
  }

  .pulse-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.8); }
  }

  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(48px, 8vw, 92px);
    line-height: 1.0;
    letter-spacing: -3px;
    color: var(--text);
    max-width: 900px;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .accent-word {
    color: var(--accent);
    position: relative;
  }
  .accent-word::after {
    content: '';
    position: absolute;
    bottom: 4px; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    opacity: 0.3;
    border-radius: 2px;
  }

  .hero-sub {
    margin-top: 28px;
    font-size: 15px;
    color: var(--muted);
    max-width: 480px;
    line-height: 1.8;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .hero-actions {
    margin-top: 48px;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    font-size: 14px;
    padding: 14px 36px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(0,229,255,0.25);
  }

  footer {
    position: relative;
    z-index: 1;
    border-top: 1px solid var(--border);
    padding: 28px 48px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media(max-width: 640px) {
    nav { padding: 0 20px; }
    footer { padding: 24px 20px; }
  }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<nav>
  <a href="index.html" class="nav-logo">
    <div class="logo-badge">
      <svg viewBox="0 0 16 16" fill="none">
        <path d="M3 4h10M3 8h7M3 12h4" stroke="#000" stroke-width="2" stroke-linecap="round"/>
        <circle cx="13" cy="10" r="3" stroke="#000" stroke-width="1.5"/>
        <path d="M15.5 12.5l-1.5-1.5" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    ContentGuard
  </a>
  <a href="documents.html" class="nav-cta">Check Document →</a>
</nav>

<section class="hero">
  <div class="hero-tag">
    <span class="pulse-dot"></span>
    Plagiarism Detection System
  </div>
  <h1>Guard your<br/><span class="accent-word">content.</span><br/>Detect the rest.</h1>
  <p class="hero-sub">
    Upload your document and get an instant plagiarism report — scored, ranked, and explained.
  </p>
  <div class="hero-actions">
    <a href="upload.html" class="btn-primary">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 1v9M5 4l3-3 3 3M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Upload Document
    </a>
  </div>
</section>

<footer>
  ContentGuard © 2026 — Academic Plagiarism Detection
</footer>

</body>
</html>
